<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Navbar with Mobile Menu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar" aria-label="Navegação principal">
      <a class="logo" href="#">Flux</a>

      <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <ul class="nav-links" id="navLinks">
        <li><a href="#home">Início</a></li>
        <li><a href="#work">Projetos</a></li>
        <li><a href="#services">Serviços</a></li>
        <li><a href="#contact">Contato</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero" id="home">
      <div class="hero-content">
        <p class="eyebrow">Componente responsivo</p>
        <h1>Menu mobile com interações suaves</h1>
        <p>Redimensione a tela ou toque no botão de menu para ver a navegação se adaptar na hora.</p>
        <a class="cta" href="#work">Explorar layout</a>
      </div>
    </section>

    <section class="feature-strip" id="work">
      <article>
        <span>01</span>
        <h2>Cabeçalho fixo</h2>
      </article>
      <article>
        <span>02</span>
        <h2>Links animados</h2>
      </article>
      <article>
        <span>03</span>
        <h2>Pensado para celular</h2>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
