<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Button Effects</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="stage">
    <section class="showcase">
      <p class="eyebrow">Efeitos ao passar o mouse</p>
      <h1>Botões animados</h1>
      <p class="intro">Quatro estilos simples de botão com movimento polido e fácil para iniciantes.</p>

      <div class="button-grid">
        <button class="btn glow">Pulso brilhante</button>
        <button class="btn slide">Preenchimento lateral</button>
        <button class="btn magnetic">Brilho elevado</button>
        <button class="btn ripple" id="rippleButton">Ondulação no clique</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
